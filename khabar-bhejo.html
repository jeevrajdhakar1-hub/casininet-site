<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>खबर भेजो | CN News</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/jeevrajdhakar1-hub/casininet-site/refs/heads/main/images/IMG_0945.png">
<meta name="color-scheme" content="dark">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #121212;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .header {
    display: flex; align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid #1f1f1f;
  }
  .back {
    background: #1a1a1a; border: 1px solid #333; color: #fff;
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; font-size: 18px; margin-right: 12px;
  }
  .logo { font-size: 20px; font-weight: 900; }
  .logo span { color: #ff3b30; }
  .logo .hi { font-size: 12px; font-weight: 500; color: #9a9a9a; margin-left: 2px; }

  /* MAIN */
  .wrap { padding: 24px 16px 120px; }

  /* TOP TEXT */
  .top-text { text-align: center; margin-bottom: 28px; }
  .top-text .icon { font-size: 48px; margin-bottom: 10px; }
  .top-text h1 { font-size: 24px; font-weight: 900; margin-bottom: 6px; }
  .top-text h1 span { color: #FF8C00; }
  .top-text p { font-size: 14px; color: #888; line-height: 1.5; }

  /* PHOTO BOX */
  .photo-box {
    width: 100%;
    background: #1a1a1a;
    border: 2px dashed #333;
    border-radius: 16px;
    min-height: 160px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; cursor: pointer;
    margin-bottom: 16px;
    position: relative; overflow: hidden;
    transition: border-color 0.2s;
  }
  .photo-box:active { border-color: #ff3b30; }
  .photo-box .ph-icon { font-size: 36px; }
  .photo-box .ph-text { font-size: 15px; font-weight: 700; color: #aaa; }
  .photo-box .ph-hint { font-size: 12px; color: #555; }
  .photo-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .photo-box img.preview {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
    display: none; border-radius: 14px;
  }
  .remove-btn {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.85); color: #fff;
    width: 30px; height: 30px; border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 800; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.2); z-index: 10;
  }

  /* TEXT AREA */
  .text-label {
    font-size: 13px; font-weight: 700; color: #888;
    margin-bottom: 8px; display: block;
  }
  textarea {
    width: 100%; background: #1a1a1a;
    border: 1px solid #2a2a2a; border-radius: 14px;
    color: #fff; font-size: 16px; font-family: inherit;
    padding: 14px; outline: none; resize: none;
    line-height: 1.65; min-height: 140px;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: rgba(255,59,48,0.5); }
  textarea.err   { border-color: #ff3b30; }
  .err-msg { font-size: 12px; color: #ff3b30; margin-top: 6px; display: none; }
  .err-msg.show { display: block; }

  /* BOTTOM BAR */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; width: 100%;
    background: rgba(18,18,18,0.98);
    border-top: 1px solid #1f1f1f;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    backdrop-filter: blur(10px);
  }
  .btn-send {
    width: 100%; height: 56px;
    background: #25D366; border: none; border-radius: 16px;
    color: #fff; font-size: 17px; font-weight: 800;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 20px rgba(37,211,102,0.3);
    transition: transform 0.15s, opacity 0.15s;
  }
  .btn-send:active { transform: scale(0.96); opacity: 0.88; }

  /* SUCCESS */
  .success {
    position: fixed; inset: 0; z-index: 999;
    background: #121212;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; text-align: center; padding: 32px;
  }
  .success.show { display: flex; }
  .success .big { font-size: 72px; }
  .success h2 { font-size: 26px; font-weight: 900; color: #25D366; }
  .success p { font-size: 14px; color: #888; line-height: 1.6; max-width: 280px; }
  .btn-back {
    margin-top: 8px; height: 48px; padding: 0 28px;
    background: #1a1a1a; border: 1px solid #333;
    border-radius: 12px; color: #fff; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back">&#8592;</a>
  <div class="logo">CN<span class="hi">न्यूज़</span></div>
</div>

<div class="wrap">

  <div class="top-text">
    <div class="icon">📢</div>
    <h1>अपनी <span>खबर</span> भेजो</h1>
    <p>आपके इलाके में कुछ हुआ?<br>हमें बताओ — हम cover करेंगे!</p>
  </div>

  <!-- PHOTO -->
  <div class="photo-box" id="photoBox" onclick="document.getElementById('photoIn').click()">
    <div class="ph-icon">📷</div>
    <div class="ph-text">Photo खींचो या चुनो</div>
    <div class="ph-hint">Optional है — बाद में भी भेज सकते हो</div>
    <input type="file" id="photoIn" accept="image/*" capture="environment" onchange="pickPhoto(this)">
    <img class="preview" id="photoPreview">
    <div class="remove-btn" id="removeBtn" onclick="removePhoto(event)">✕</div>
  </div>

  <!-- TEXT -->
  <span class="text-label">क्या हुआ? यहाँ लिखो 👇</span>
  <textarea id="khabar" placeholder="जैसे: आज सुबह हमारे गांव की सड़क टूटी हुई है, कई दिनों से कोई मरम्मत नहीं हुई..." maxlength="500" oninput="this.classList.remove('err'); document.getElementById('errMsg').classList.remove('show')"></textarea>
  <div class="err-msg" id="errMsg">⚠️ पहले कुछ तो लिखो!</div>

</div>

<!-- BOTTOM -->
<div class="bottom-bar">
  <button class="btn-send" onclick="send()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    WhatsApp पर भेजो
  </button>
</div>

<!-- SUCCESS -->
<div class="success" id="success">
  <div class="big">✅</div>
  <h2>खबर भेज दी!</h2>
  <p>WhatsApp खुल रहा है...<br>CN News टीम जल्द संपर्क करेगी।</p>
  <button class="btn-back" onclick="reset()">← वापस जाएं</button>
</div>

<script>
  // ── PHOTO ──
  function pickPhoto(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const prev = document.getElementById('photoPreview');
      const box  = document.getElementById('photoBox');
      const rem  = document.getElementById('removeBtn');
      prev.src = e.target.result;
      prev.style.display = 'block';
      rem.style.display  = 'flex';
      box.querySelectorAll('.ph-icon,.ph-text,.ph-hint').forEach(el => el.style.display = 'none');
    };
    reader.readAsDataURL(file);
  }

  function removePhoto(e) {
    e.stopPropagation();
    document.getElementById('photoIn').value = '';
    const prev = document.getElementById('photoPreview');
    const box  = document.getElementById('photoBox');
    const rem  = document.getElementById('removeBtn');
    prev.src = ''; prev.style.display = 'none';
    rem.style.display = 'none';
    box.querySelectorAll('.ph-icon,.ph-text,.ph-hint').forEach(el => el.style.display = '');
  }

  // ── SEND ──
  function send() {
    const text     = document.getElementById('khabar').value.trim();
    const hasPhoto = document.getElementById('photoIn').files.length > 0;

    if (!text) {
      document.getElementById('khabar').classList.add('err');
      document.getElementById('errMsg').classList.add('show');
      document.getElementById('khabar').focus();
      if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
      return;
    }

    let msg = '📢 *CN News — नई खबर*\n\n';
    msg += text;
    if (hasPhoto) msg += '\n\n📸 _(Photo भी भेज रहे हैं)_';
    msg += '\n\n— CN News App';

    // ← अपना WhatsApp नंबर यहाँ डालो (91 + 10 digit)
    const WA = '91XXXXXXXXXX';
    const url = 'https://api.whatsapp.com/send?phone=' + WA + '&text=' + encodeURIComponent(msg);

    if (navigator.vibrate) navigator.vibrate(20);
    document.getElementById('success').classList.add('show');
    setTimeout(() => window.open(url, '_blank'), 500);
  }

  // ── RESET ──
  function reset() {
    document.getElementById('success').classList.remove('show');
    document.getElementById('khabar').value = '';
    removePhoto({ stopPropagation: () => {} });
  }
</script>
</body>
</html>
