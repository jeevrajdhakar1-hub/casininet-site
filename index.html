<style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; cursor: pointer; }

    body {
        background: #111;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 0 0 env(safe-area-inset-bottom) 0;
        -webkit-font-smoothing: antialiased;
        transition: opacity 0.3s ease;
    }

    /* ===== HEADER ===== */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        background: #1a1a1a;
        border-bottom: 1px solid #2a2a2a;
        position: sticky;
        top: 0;
        z-index: 1000;
    }
    .logo {
        font-size: 22px; font-weight: 900; color: #fff;
        text-decoration: none; font-style: normal; letter-spacing: -1px;
        line-height: 1; display: flex; flex-direction: row; align-items: baseline; gap: 3px;
    }
    .logo .news-hi { font-size: 13px; font-weight: 600; color: #ccc; letter-spacing: 0.5px; font-style: normal; }
    .live-pill {
        display: flex; align-items: center; gap: 6px;
        color: #e8001c; font-size: 12px; font-weight: 800;
        border: 1px solid #e8001c; padding: 4px 10px; border-radius: 8px;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .profile-btn {
        width: 32px; height: 32px; border-radius: 50%;
        background: #333; border: 1px solid #444;
        display: flex; align-items: center; justify-content: center;
    }
    .profile-btn svg { width: 16px; height: 16px; stroke: #aaa; fill: none; stroke-width: 1.5; }

    .dot { width: 7px; height: 7px; background: #e8001c; border-radius: 50%; animation: blink 1s infinite; flex-shrink: 0; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ===== CARDS ===== */

    /* Big first card */
    .card-big { display: block; text-decoration: none; padding: 14px 14px 12px 14px; position: relative; }
    .card-big img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; display: block; margin-bottom: 10px; }
    .card-big .c-tag { color: #888; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; margin-bottom: 5px; display: block; }
    .card-big .c-title { font-size: 17px; font-weight: 700; color: #fff; line-height: 1.4; padding-right: 35px; display: block; }

    /* Horizontal card */
    .card-h { display: flex; align-items: flex-start; gap: 12px; padding: 14px 14px; text-decoration: none; position: relative; }
    .card-h-text { flex: 1; }
    .card-h .c-tag { color: #888; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; margin-bottom: 5px; display: block; }
    .card-h .c-title {
        font-size: 14px; font-weight: 600; color: #fff; line-height: 1.4;
        display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        padding-right: 30px;
    }
    .card-h img { width: 100px; height: 70px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }

    /* 2-col grid */
    .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #2a2a2a; }
    .card-g { background: #111; padding: 10px 10px 14px 10px; text-decoration: none; display: block; position: relative; }
    .card-g img { width: 100%; height: 100px; object-fit: cover; border-radius: 4px; margin-bottom: 8px; display: block; }
    .card-g .c-tag { color: #888; font-size: 10px; font-weight: 600; letter-spacing: 0.3px; margin-bottom: 4px; display: block; }
    .card-g .c-title {
        font-size: 12px; font-weight: 600; color: #fff; line-height: 1.3;
        display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        padding-right: 25px;
    }

    /* Divider */
    .divider { height: 1px; background: #2a2a2a; margin: 0 14px; }
    .divider-full { height: 1px; background: #2a2a2a; }

    /* Share btn */
    .share-btn {
        position: absolute; right: 8px; bottom: 8px;
        background: #fff; width: 28px; height: 28px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        z-index: 10; transition: transform 0.2s;
    }
    .share-btn:active { transform: scale(1.2); }
    .share-btn svg { width: 14px; height: 14px; fill: #000; }

    /* Skeleton */
    .skeleton {
        background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.5s infinite;
        border-radius: 4px;
    }
    @keyframes skeleton-loading { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .sk-row { display: flex; gap: 12px; padding: 14px; border-bottom: 1px solid #222; }
    .sk-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }

    /* Inline related */
    .inline-related-box { padding: 8px 14px; }
    .inline-related-box a {
        display: flex; align-items: center; gap: 12px;
        background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 8px;
        padding: 10px 12px; text-decoration: none;
    }
    .inline-related-box img { width: 75px; height: 55px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
    .inline-related-label { color: #e8001c; font-size: 10px; font-weight: 800; display: block; margin-bottom: 4px; }
    .inline-related-title { font-size: 13px; color: #fff; font-weight: 600; line-height: 1.3; }

    /* Prcha */
    .prcha-wrap { padding: 4px 14px 10px; }
    .prcha-wrap img { width: 100%; height: 180px; border-radius: 8px; border: 1px solid #222; object-fit: cover; display: block; }

    /* Bottom bar */
    .cn-action-bar {
        position: fixed; bottom: 0; left: 0; width: 100%;
        display: flex; z-index: 9999;
        background: #1a1a1a; border-top: 1px solid #2a2a2a;
        padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
        gap: 10px; box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
    }
    .cn-btn {
        flex: 1; height: 46px; border-radius: 10px;
        display: flex; align-items: center; justify-content: center; gap: 6px;
        font-size: 13px; font-weight: 700; text-decoration: none;
        border: none; color: #fff; transition: all 0.2s; font-family: inherit;
    }
    .cn-wa { background: #25D366; box-shadow: 0 4px 12px rgba(37,211,102,0.2); }
    .cn-pwa { background: #e8001c; display: none; box-shadow: 0 4px 12px rgba(232,0,28,0.2); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
    .cn-btn:active { transform: scale(0.94); opacity: 0.8; }

    /* Footer */
    .micro-footer {
        text-align: center; padding: 30px 20px 100px;
        border-top: 1px solid #1c1c1e; margin-top: 10px;
        font-size: 12px; color: #48484a; background: #111;
    }
    .micro-footer a { color: #666; text-decoration: none; margin: 0 8px; font-weight: 600; }
    .micro-footer a:hover { color: #fff; }

    @media screen and (min-width: 768px) {
        body { max-width: 540px; margin: 0 auto; }
        .cn-action-bar { max-width: 540px; left: 50%; transform: translateX(-50%); border-radius: 16px 16px 0 0; }
    }
</style>

<script>
    let allMainNews = [];
    let visibleCount = 12;
    const step = 9;
    let isLoading = false;
    let isRelatedBoxAdded = false;
    let gridBuffer = [];

    const h = () => { if (navigator.vibrate) navigator.vibrate(15); };

    const shareIcon = `<svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>`;

    async function share(e, title, id) {
        e.stopPropagation();
        h();
        const shareUrl = window.location.origin + '/news-' + id + '.html?v=' + Math.floor(Math.random() * 100);
        try { await navigator.share({ title: 'CN NEWS', text: '🔥 ' + title, url: shareUrl }); }
        catch (err) { console.log("Share cancelled"); }
    }

    function go(id) {
        h();
        document.body.style.opacity = "0";
        setTimeout(() => { window.location.href = `news-${id}.html`; }, 250);
    }

    function showSkeletons() {
        const c = document.getElementById('m');
        let html = '';
        for (let i = 0; i < 6; i++) {
            html += `<div class="sk-row">
                <div class="sk-lines">
                    <div class="skeleton" style="height:10px;width:35%;"></div>
                    <div class="skeleton" style="height:14px;width:100%;"></div>
                    <div class="skeleton" style="height:14px;width:75%;"></div>
                </div>
                <div class="skeleton" style="width:100px;height:70px;border-radius:4px;flex-shrink:0;"></div>
            </div>`;
        }
        c.innerHTML = html;
    }

    function flushGrid(container) {
        if (gridBuffer.length === 0) return;
        let rowHtml = `<div class="grid-row">`;
        gridBuffer.forEach(n => {
            rowHtml += `<div class="card-g" onclick="go(${n.id})">
                <img src="${n.img}" loading="lazy">
                <span class="c-tag">${n.tag}</span>
                <span class="c-title">${n.headline}</span>
                <div class="share-btn" onclick="share(event,'${n.headline.replace(/'/g,"\\'")}',${n.id})">${shareIcon}</div>
            </div>`;
        });
        rowHtml += `</div><div class="divider-full"></div>`;
        container.insertAdjacentHTML('beforeend', rowHtml);
        gridBuffer = [];
    }

    function renderNews(isInitial = false) {
        const container = document.getElementById('m');
        const start = isInitial ? 0 : visibleCount - step;
        const newsToShow = allMainNews.slice(start, visibleCount);

        newsToShow.forEach((n, index) => {
            const absIndex = start + index;

            // Card 0: Big full-width
            if (absIndex === 0) {
                container.insertAdjacentHTML('beforeend', `
                <div onclick="go(${n.id})" style="position:relative;">
                    <div class="card-big">
                        <img src="${n.img}" loading="eager" fetchpriority="high">
                        <span class="c-tag">${n.tag}</span>
                        <span class="c-title">${n.headline}</span>
                    </div>
                    <div class="share-btn" onclick="share(event,'${n.headline.replace(/'/g,"\\'")}',${n.id})">${shareIcon}</div>
                </div>
                <div class="divider"></div>`);
                return;
            }

            // Cards 1-4: Horizontal
            if (absIndex >= 1 && absIndex <= 4) {
                container.insertAdjacentHTML('beforeend', `
                <div onclick="go(${n.id})" style="position:relative;">
                    <div class="card-h">
                        <div class="card-h-text">
                            <span class="c-tag">${n.tag}</span>
                            <span class="c-title">${n.headline}</span>
                        </div>
                        <img src="${n.img}" loading="lazy">
                    </div>
                    <div class="share-btn" onclick="share(event,'${n.headline.replace(/'/g,"\\'")}',${n.id})">${shareIcon}</div>
                </div>
                <div class="divider"></div>`);

                if (isInitial && absIndex === 3) {
                    container.insertAdjacentHTML('beforeend', `
                    <div class="prcha-wrap">
                        <img src="https://raw.githubusercontent.com/jeevrajdhakar1-hub/casininet-site/refs/heads/main/images/prcha.gif" loading="lazy">
                    </div>
                    <div class="divider"></div>`);
                }
                return;
            }

            // Related box at 8 cards
            let cardCount = container.querySelectorAll('.card-big, .card-h, .card-g').length;
            if (cardCount === 8 && !isRelatedBoxAdded) {
                flushGrid(container); // flush any pending grid first
                container.insertAdjacentHTML('beforeend', `
                <div class="inline-related-box">
                    <a href="https://casininet.com/news-115.html">
                        <img src="https://i.postimg.cc/k4Jwfw6n/Screenshot-2026-01-20-11-40-54-75-99c04817c0de5652397fc8b56c3b3817.jpg">
                        <div>
                            <span class="inline-related-label">Most Viewed</span>
                            <div class="inline-related-title">बिजोलिया स्पेशल रिपोर्ट: सैंडस्टोन माइनिंग की चमक या बुझता भविष्य?</div>
                        </div>
                    </a>
                </div>
                <div class="divider"></div>`);
                isRelatedBoxAdded = true;
            }

            // Cards 5+: 2-col grid
            gridBuffer.push(n);
            if (gridBuffer.length === 2) flushGrid(container);
        });

        if (gridBuffer.length === 1) flushGrid(container);
    }

    async function load() {
        isRelatedBoxAdded = false;
        gridBuffer = [];
        showSkeletons();
        try {
            const r = await fetch('data.json');
            const d = await r.json();
            allMainNews = d.filter(x => x.type === "main").reverse();
            document.getElementById('m').innerHTML = "";
            gridBuffer = [];
            renderNews(true);
        } catch (e) {
            console.error("Data Load Error");
            document.getElementById('m').innerHTML = "<p style='text-align:center;color:#444;padding:40px;'>Network error. Please refresh.</p>";
        }
    }

    window.onscroll = function() {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1200) {
            if (visibleCount < allMainNews.length && !isLoading) {
                isLoading = true;
                visibleCount += step;
                renderNews();
                setTimeout(() => { isLoading = false; }, 500);
            }
        }
    };

    window.addEventListener("pageshow", () => { document.body.style.opacity = "1"; });
    load();
</script>

const pwaInstallBtn = document.getElementById('pwaInstallBtn');
window.addEventListener('beforeinstallprompt', (e) => {
    console.log('PWA Ready to Install');

    cnDeferredPrompt = e;
    pwaInstallBtn.style.display = 'flex';
});
pwaInstallBtn.addEventListener('click', () => {
    if (cnDeferredPrompt) {
        cnDeferredPrompt.prompt();
        cnDeferredPrompt.userChoice.then((choice) => {
            if (choice.outcome === 'accepted') {
                console.log('User ne install kar liya');
                gtag('event', 'pwa_install_success', { 'event_category': 'Engagement', 'event_label': 'PWA Installed' });
                pwaInstallBtn.style.display = 'none';
            }
            cnDeferredPrompt = null;
        });
    }
});
</script>
