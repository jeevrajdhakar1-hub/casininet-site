<style>
    :root {
        --red: #D0021B;
        --red-soft: rgba(208,2,27,0.08);
        --red-glow: rgba(208,2,27,0.18);
        --bg: #0A0A0C;
        --bg2: #111115;
        --bg3: #18181E;
        --border: rgba(255,255,255,0.07);
        --border-strong: rgba(255,255,255,0.12);
        --text-primary: #F2F2F5;
        --text-secondary: #8A8A96;
        --text-muted: #52525E;
        --font-display: 'Playfair Display', Georgia, serif;
        --font-body: 'Noto Sans Devanagari', -apple-system, sans-serif;
        --radius: 4px;
        --radius-lg: 14px;
        --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
        outline: none;
        cursor: pointer;
        margin: 0;
        padding: 0;
    }

    html {
        scroll-behavior: smooth;
    }

    body {
        background: var(--bg);
        color: var(--text-primary);
        font-family: var(--font-body);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        padding: 0 0 env(safe-area-inset-bottom) 0;
        transition: opacity 0.3s ease;
        will-change: opacity;
    }

    /* ===== HEADER ===== */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 16px;
        height: 56px;
        background: #0a0a0c;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 1000;
        contain: layout style;
        transition: box-shadow 0.25s ease;
    }
    @supports (backdrop-filter: blur(1px)) {
        .header {
            background: rgba(10,10,12,0.97);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    }

    .header.scrolled {
        box-shadow: 0 4px 32px rgba(0,0,0,0.6);
    }

    .header::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent 0%, var(--red) 20%, var(--red) 80%, transparent 100%);
        opacity: 0.9;
    }

    .logo {
        font-family: var(--font-display);
        font-size: 26px;
        font-weight: 900;
        color: var(--text-primary);
        text-decoration: none;
        letter-spacing: -0.5px;
        line-height: 1;
        display: flex;
        align-items: baseline;
        gap: 2px;
        transition: opacity var(--transition);
    }
    .logo:active { opacity: 0.7; }

    .logo .logo-cn { color: #fff; }

    .logo .news-hi {
        font-family: var(--font-body);
        font-size: 11px;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-left: 4px;
        align-self: center;
    }

    .live-pill {
        display: flex;
        align-items: center;
        gap: 5px;
        color: var(--red);
        font-size: 10px;
        font-weight: 800;
        border: 1px solid rgba(208,2,27,0.35);
        background: var(--red-soft);
        padding: 5px 10px;
        border-radius: 4px;
        letter-spacing: 1px;
        transition: border-color var(--transition), background var(--transition);
    }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .profile-btn {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--bg3);
        border: 1px solid var(--border-strong);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }
    .profile-btn:active { background: var(--bg2); transform: scale(0.92); }
    .profile-btn svg { width: 15px; height: 15px; stroke: var(--text-secondary); fill: none; stroke-width: 1.5; }

    .dot {
        width: 6px; height: 6px;
        background: var(--red);
        border-radius: 50%;
        animation: blink 1.4s ease-in-out infinite;
        flex-shrink: 0;
        box-shadow: 0 0 6px var(--red);
    }
    @keyframes blink { 0%,100%{opacity:1;box-shadow:0 0 6px var(--red)} 50%{opacity:0.3;box-shadow:none} }

    /* ===== TICKER ===== */
    .ticker-bar {
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        height: 36px;
        overflow: hidden;
    }

    .ticker-label {
        background: var(--red);
        color: #fff;
        font-size: 9px;
        font-weight: 800;
        padding: 0 14px;
        height: 100%;
        display: flex;
        align-items: center;
        white-space: nowrap;
        flex-shrink: 0;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        position: relative;
    }

    .ticker-label::after {
        content: '';
        position: absolute;
        right: -8px; top: 0;
        width: 0; height: 0;
        border-top: 18px solid transparent;
        border-bottom: 18px solid transparent;
        border-left: 8px solid var(--red);
    }

    .ticker-scroll { flex: 1; overflow: hidden; padding-left: 16px; }
    .ticker-text {
        display: inline-block;
        white-space: nowrap;
        font-size: 11.5px;
        color: var(--text-secondary);
        font-weight: 500;
        animation: scroll-ticker 28s linear infinite;
        padding-left: 20px;
    }
    @keyframes scroll-ticker { 0%{transform:translateX(100vw)} 100%{transform:translateX(-100%)} }

    /* ===== NEWS CARDS ===== */
    #m { padding: 0; }

    /* Big first card */
    .card-big {
        display: block;
        text-decoration: none;
        padding: 16px 14px 14px;
        position: relative;
        background: var(--bg);
        transition: background var(--transition);
    }
    .card-big:active { background: rgba(255,255,255,0.02); }

    .card-big-img-wrap {
        position: relative;
        border-radius: var(--radius);
        overflow: hidden;
        margin-bottom: 13px;
    }

    .card-big img {
        width: 100%;
        height: 210px;
        object-fit: cover;
        display: block;
    }
    .card-big:active img { opacity: 0.88; }

    .card-big-img-wrap::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 55%;
        background: linear-gradient(to top, rgba(10,10,12,0.75) 0%, transparent 100%);
        pointer-events: none;
    }

    .card-big .c-tag {
        display: inline-flex;
        align-items: center;
        color: var(--red);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        margin-bottom: 7px;
        gap: 6px;
    }
    .card-big .c-tag::before {
        content: '';
        width: 12px; height: 2px;
        background: var(--red);
        border-radius: 1px;
        flex-shrink: 0;
    }

    .card-big .c-title {
        font-family: var(--font-display);
        font-size: 19px;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1.45;
        display: block;
        padding-right: 36px;
        letter-spacing: -0.2px;
    }

    /* Horizontal card */
    .card-h {
        display: flex;
        align-items: flex-start;
        gap: 13px;
        padding: 14px;
        text-decoration: none;
        position: relative;
        background: var(--bg);
        contain: layout style;
    }
    .card-h:active { background: rgba(255,255,255,0.025); }

    .card-h-text { flex: 1; }

    .card-h .c-tag {
        display: inline-flex;
        align-items: center;
        color: var(--red);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 6px;
        gap: 5px;
    }
    .card-h .c-tag::before {
        content: '';
        width: 10px; height: 2px;
        background: var(--red);
        border-radius: 1px;
        flex-shrink: 0;
    }

    .card-h .c-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.55;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        padding-right: 30px;
        letter-spacing: 0.1px;
    }

    .card-h-img-wrap {
        position: relative;
        border-radius: var(--radius);
        overflow: hidden;
        flex-shrink: 0;
        width: 100px;
        height: 72px;
    }

    .card-h img {
        width: 100%; height: 100%;
        object-fit: cover;
        display: block;
    }
    .card-h:active img { opacity: 0.85; }

    /* Grid */
    .grid-row {
        display: flex;
        gap: 1px;
        background: var(--border);
    }

    .card-g {
        background: var(--bg2);
        padding: 10px 10px 14px;
        text-decoration: none;
        display: block;
        position: relative;
        flex: 1;
        contain: layout style;
    }
    .card-g:active { background: var(--bg3); }

    .card-g-img-wrap {
        position: relative;
        border-radius: var(--radius);
        overflow: hidden;
        margin-bottom: 9px;
    }

    .card-g img {
        width: 100%; height: 105px;
        object-fit: cover;
        display: block;
    }
    .card-g:active img { opacity: 0.85; }

    .card-g .c-tag {
        display: inline-flex;
        align-items: center;
        color: var(--red);
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 5px;
        gap: 4px;
    }
    .card-g .c-tag::before {
        content: '';
        width: 8px; height: 1.5px;
        background: var(--red);
        border-radius: 1px;
        flex-shrink: 0;
    }

    .card-g .c-title {
        font-size: 12.5px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.45;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        padding-right: 26px;
    }

    /* Dividers */
    .divider {
        height: 1px;
        background: var(--border);
        margin: 0 14px;
    }
    .divider-full {
        height: 1px;
        background: var(--border);
    }

    /* Section label */
    .section-label {
        padding: 14px 14px 0;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .section-label span {
        font-size: 9px;
        font-weight: 800;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .section-label::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--border);
    }

    /* Share btn */
    .share-btn {
        position: absolute;
        right: 8px;
        bottom: 10px;
        background: rgba(20,20,26,0.95);
        border: 1px solid var(--border-strong);
        width: 30px; height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .share-btn:active { opacity: 0.7; }
    .share-btn svg { width: 13px; height: 13px; fill: var(--text-secondary); }

    /* Skeleton */
    .skeleton {
        background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
        background-size: 200% 100%;
        animation: skeleton-loading 1.6s ease-in-out infinite;
        border-radius: var(--radius);
    }
    @keyframes skeleton-loading { 0%{background-position:150% 0} 100%{background-position:-150% 0} }

    .sk-row {
        display: flex;
        gap: 12px;
        padding: 14px;
        border-bottom: 1px solid var(--border);
        animation: fadeIn 0.4s ease both;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .sk-lines { flex: 1; display: flex; flex-direction: column; gap: 8px; }

    /* Inline related */
    .inline-related-box { padding: 10px 14px; }
    .inline-related-box a {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--bg3);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius-lg);
        padding: 12px;
        text-decoration: none;
        transition: background var(--transition), border-color var(--transition), transform var(--transition);
        position: relative;
        overflow: hidden;
    }
    .inline-related-box a::before {
        content: '';
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 3px;
        background: var(--red);
        border-radius: 0 2px 2px 0;
    }
    .inline-related-box a:active {
        background: #1f1f27;
        border-color: rgba(255,255,255,0.18);
        transform: scale(0.99);
    }
    .inline-related-box img {
        width: 78px; height: 58px;
        object-fit: cover;
        border-radius: var(--radius);
        flex-shrink: 0;
        box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    }
    .inline-related-label {
        color: var(--red);
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        display: block;
        margin-bottom: 5px;
    }
    .inline-related-title {
        font-size: 13px;
        color: var(--text-primary);
        font-weight: 600;
        line-height: 1.4;
    }

    /* Prcha */
    .prcha-wrap { padding: 4px 14px 12px; }
    .prcha-label {
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        text-align: right;
        margin-bottom: 4px;
        font-weight: 600;
    }
    .prcha-wrap img {
        width: 100%;
        height: 180px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        object-fit: cover;
        display: block;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    /* ===== BOTTOM ACTION BAR ===== */
    .cn-action-bar {
        position: fixed;
        bottom: 0; left: 0;
        width: 100%;
        display: flex;
        z-index: 9999;
        background: rgba(12,12,16,0.98);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid var(--border-strong);
        padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
        gap: 10px;
    }

    .cn-btn {
        flex: 1;
        height: 48px;
        border-radius: var(--radius-lg);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
        border: none;
        color: #fff;
        transition: transform 0.18s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.18s, box-shadow 0.18s;
        font-family: var(--font-body);
        letter-spacing: 0.2px;
    }
    .cn-wa {
        background: #25D366;
        box-shadow: 0 3px 12px rgba(37,211,102,0.22);
    }
    .cn-pwa {
        background: var(--red);
        display: none;
        box-shadow: 0 3px 12px rgba(208,2,27,0.25);
        animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.018)} }
    .cn-btn:active { transform: scale(0.93); opacity: 0.88; }

    /* ===== FOOTER ===== */
    .micro-footer {
        text-align: center;
        padding: 28px 20px 110px;
        border-top: 1px solid var(--border);
        margin-top: 14px;
        font-size: 11px;
        color: var(--text-muted);
        background: var(--bg);
        letter-spacing: 0.3px;
    }
    .micro-footer .footer-logo {
        font-family: var(--font-display);
        font-size: 18px;
        font-weight: 900;
        color: var(--text-muted);
        margin-bottom: 12px;
        display: block;
    }
    .micro-footer a {
        color: var(--text-muted);
        text-decoration: none;
        margin: 0 7px;
        font-weight: 600;
        transition: color var(--transition);
    }
    .micro-footer a:hover { color: var(--text-secondary); }
    .micro-footer .copy {
        display: block;
        margin-top: 12px;
        color: var(--text-muted);
        opacity: 0.6;
    }

    /* Card entry animation */
    @keyframes cardIn {
        from { opacity: 0; }
        to   { opacity: 1; }
    }
    .card-anim {
        animation: cardIn 0.28s ease both;
    }

    /* ===== DESKTOP ===== */
    @media screen and (min-width: 768px) {
        body { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        .header { border-radius: 0 0 var(--radius-lg) var(--radius-lg); margin-bottom: 10px; }
        .ticker-bar { border-radius: var(--radius-lg); margin-bottom: 10px; }
        #m { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; align-items: start; }
        #m > div:first-child { grid-column: 1 / -1; }
        .card-h { flex-direction: column; }
        .card-h-img-wrap { width: 100%; height: 160px; }
        .card-h img { width: 100%; height: 100%; }
        .card-h .c-title { -webkit-line-clamp: 4; }
        .card-g img { height: 130px; }
        .card-big img { height: 340px; }
        .card-big .c-title { font-size: 24px; }
        .divider { margin: 0 10px; }
        .cn-action-bar {
            max-width: 600px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }
        .micro-footer { padding-bottom: 100px; }
    }

    /* ===== BOX COLOR OVERRIDE — सभी boxes का background #3f3f3f ===== */
    .card-big,
    .card-h,
    .card-g,
    .inline-related-box,
    .inline-related-box a,
    .prcha-wrap,
    .sk-row,
    .grid-row,
    .profile-btn,
    .share-btn {
        background: #3f3f3f !important;
    }
    .cn-wa { background: #3f3f3f !important; box-shadow: none !important; }
    .cn-pwa { background: #3f3f3f !important; box-shadow: none !important; }
    .cn-action-bar { background: #3f3f3f !important; }

    /* ===== PREMIUM TICKER UPGRADE ===== */
    .ticker-bar {
        background: linear-gradient(135deg, #1a1a20 0%, #22222a 100%) !important;
        border-bottom: 1px solid rgba(208,2,27,0.25) !important;
        border-top: 1px solid rgba(255,255,255,0.04) !important;
        height: 44px !important;
        box-shadow: 0 2px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.03) !important;
        position: relative !important;
    }
    .ticker-bar::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(208,2,27,0.4), transparent);
    }
    .ticker-label {
        background: linear-gradient(135deg, #D0021B 0%, #ff1a30 60%, #b0001a 100%) !important;
        color: #fff !important;
        font-size: 10px !important;
        font-weight: 900 !important;
        padding: 0 18px 0 14px !important;
        letter-spacing: 2px !important;
        text-shadow: 0 1px 3px rgba(0,0,0,0.4) !important;
        box-shadow: 2px 0 12px rgba(208,2,27,0.5) !important;
        gap: 7px !important;
        display: flex !important;
        align-items: center !important;
    }
    .ticker-label::before {
        content: '';
        width: 7px;
        height: 7px;
        background: #fff;
        border-radius: 50%;
        flex-shrink: 0;
        animation: tickerPulse 1.2s ease-in-out infinite;
        box-shadow: 0 0 8px rgba(255,255,255,0.8);
    }
    .ticker-label::after {
        border-left-color: #b0001a !important;

</style>

<div class="header" id="mainHeader">
    <a href="#" class="logo">
        <span class="logo-cn">CN</span><span class="news-hi">न्यूज़</span>

<!-- NEWS -->
<div id="m"></div>

<footer class="micro-footer" style="content-visibility:auto;contain-intrinsic-size:0 160px;">
    <span class="footer-logo">CN न्यूज़</span>
    <div>
        <a href="about.html">About Us</a> ·
        <a href="editorial-policy.html">Editorial Policy</a> ·
        <a href="editorial-team.html">Editorial Team</a> ·
        <a href="contact.html">Contact</a>
    </div>
    <span class="copy">© 2026 CASINInet News</span>
</footer>

    <a href="https://chat.whatsapp.com/DbD0P3N2Pk6EreoUXHN8uJ?mode=gi_t" class="cn-btn cn-wa">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="16" style="filter:brightness(0) invert(1);">
        WhatsApp
    </a>

<script>
    // Header scroll shadow
    const header = document.getElementById('mainHeader');
    window.addEventListener('scroll', () => {
        header.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });

    let allMainNews = [];
    let visibleCount = 12;
    const step = 9;
    let isLoading = false;
    let isRelatedBoxAdded = false;
    let gridBuffer = [];

    const h = () => { if (navigator.vibrate) navigator.vibrate(12); };

    const shareIcon = `<svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>`;

    async function share(e, title, id) {
        e.stopPropagation();
        h();
        const shareUrl = window.location.origin + '/news-' + id + '.html?v=' + Math.floor(Math.random() * 100);
        try { await navigator.share({ title: 'CN NEWS', text: '🔥 ' + title, url: shareUrl }); }
        catch (err) { console.log("Share cancelled"); }
    }

    function go(id) {
        h();
        document.body.style.opacity = "0";
        setTimeout(() => { window.location.href = `news-${id}.html`; }, 280);
    }

    function showSkeletons() {
        const c = document.getElementById('m');
        let html = '';
        for (let i = 0; i < 6; i++) {
            html += `<div class="sk-row" style="animation-delay:${i*0.06}s">
                <div class="sk-lines">
                    <div class="skeleton" style="height:9px;width:32%;"></div>
                    <div class="skeleton" style="height:13px;width:100%;margin-top:2px;"></div>
                    <div class="skeleton" style="height:13px;width:78%;"></div>
                    <div class="skeleton" style="height:13px;width:60%;"></div>
                </div>
                <div class="skeleton" style="width:100px;height:72px;border-radius:8px;flex-shrink:0;"></div>
            </div>`;
        }
        c.innerHTML = html;
    }

    function flushGrid(container) {
        if (gridBuffer.length === 0) return;
        let rowHtml = `<div class="grid-row card-anim">`;
        gridBuffer.forEach(n => {
            rowHtml += `<div class="card-g" onclick="go(${n.id})">
                <div class="card-g-img-wrap"><img src="${n.img}" loading="lazy" decoding="async"></div>
                <span class="c-tag">${n.tag}</span>
                <span class="c-title">${n.headline}</span>
                <div class="share-btn" onclick="share(event,'${n.headline.replace(/'/g,"\\'")}',${n.id})">${shareIcon}</div>
            </div>`;
        });
        rowHtml += `</div><div class="divider-full"></div>`;
        container.insertAdjacentHTML('beforeend', rowHtml);
        gridBuffer = [];
    }

    function renderNews(isInitial = false) {
        const container = document.getElementById('m');
        const start = isInitial ? 0 : visibleCount - step;
        const newsToShow = allMainNews.slice(start, visibleCount);

        newsToShow.forEach((n, index) => {
            const absIndex = start + index;

            if (absIndex === 0) {
                container.insertAdjacentHTML('beforeend', `
                <div onclick="go(${n.id})" style="position:relative;" class="card-anim">
                    <div class="card-big">
                        <div class="card-big-img-wrap">
                            <img src="${n.img}" loading="eager" fetchpriority="high" decoding="async">
                        </div>
                        <span class="c-tag">${n.tag}</span>
                        <span class="c-title">${n.headline}</span>
                    </div>
                    <div class="share-btn" onclick="share(event,'${n.headline.replace(/'/g,"\\'")}',${n.id})">${shareIcon}</div>
                </div>
                <div class="divider"></div>`);
                return;
            }

            if (absIndex >= 1 && absIndex <= 4) {
                container.insertAdjacentHTML('beforeend', `
                <div onclick="go(${n.id})" style="position:relative;" class="card-anim" style="animation-delay:${absIndex*0.05}s">
                    <div class="card-h">
                        <div class="card-h-text">
                            <span class="c-tag">${n.tag}</span>
                            <span class="c-title">${n.headline}</span>
                        </div>
                        <div class="card-h-img-wrap">
                            <img src="${n.img}" loading="lazy" decoding="async">
                        </div>
                    </div>
                    <div class="share-btn" onclick="share(event,'${n.headline.replace(/'/g,"\\'")}',${n.id})">${shareIcon}</div>
                </div>
                <div class="divider"></div>`);

                if (isInitial && absIndex === 3) {
                    container.insertAdjacentHTML('beforeend', `
                    <div class="prcha-wrap">
                        <div class="prcha-label">विज्ञापन</div>
                        <img src="https://raw.githubusercontent.com/jeevrajdhakar1-hub/casininet-site/refs/heads/main/images/prcha.gif" loading="lazy">
                    </div>
                    <div class="divider"></div>`);
                }
                return;
            }

            let cardCount = container.querySelectorAll('.card-big, .card-h, .card-g').length;
            if (cardCount === 8 && !isRelatedBoxAdded) {
                flushGrid(container);
                container.insertAdjacentHTML('beforeend', `
                <div class="inline-related-box card-anim">
                    <a href="https://casininet.com/news-115.html">
                        <img src="https://i.postimg.cc/k4Jwfw6n/Screenshot-2026-01-20-11-40-54-75-99c04817c0de5652397fc8b56c3b3817.jpg">
                        <div>
                            <span class="inline-related-label">Most Viewed</span>
                            <div class="inline-related-title">बिजोलिया स्पेशल रिपोर्ट: सैंडस्टोन माइनिंग की चमक या बुझता भविष्य?</div>
                        </div>
                    </a>
                </div>
                <div class="divider"></div>`);
                isRelatedBoxAdded = true;
            }

            gridBuffer.push(n);
            if (gridBuffer.length === 2) flushGrid(container);
        });

        if (gridBuffer.length === 1) flushGrid(container);
    }

    async function load() {
        isRelatedBoxAdded = false;
        gridBuffer = [];
        showSkeletons();
        try {
            const r = await fetch('data.json');
            const d = await r.json();
            allMainNews = d.filter(x => x.type === "main").reverse();
            document.getElementById('m').innerHTML = "";
            gridBuffer = [];
            renderNews(true);
        } catch (e) {
            console.error("Data Load Error");
            document.getElementById('m').innerHTML = "<p style='text-align:center;color:#52525E;padding:48px 20px;font-size:14px;'>Network error. Please refresh.</p>";
        }
    }

    window.addEventListener('scroll', function() {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 1200) {
            if (visibleCount < allMainNews.length && !isLoading) {
                isLoading = true;
                visibleCount += step;
                renderNews();
                setTimeout(() => { isLoading = false; }, 500);
            }
        }
    }, { passive: true });

    window.addEventListener("pageshow", () => { document.body.style.opacity = "1"; });
    load();
</script>
